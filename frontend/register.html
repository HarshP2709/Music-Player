<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — Harmony Music Player</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body class="auth-page">

  <div id="loadingScreen">
    <div class="loading-logo">♪ Harmony</div>
    <div class="loading-bars">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
  </div>

  <!-- Hero Panel -->
  <aside class="auth-hero" aria-hidden="true">
    <div class="auth-hero__orb auth-hero__orb--1"></div>
    <div class="auth-hero__orb auth-hero__orb--2"></div>
    <div class="auth-hero__orb auth-hero__orb--3"></div>
    <div class="auth-hero__content">
      <div class="auth-hero__logo">Har<span>mony</span></div>
      <p class="auth-hero__tagline">Join millions of music lovers</p>
      <div class="auth-vinyl spinning"></div>
      <div class="auth-hero__features">
        <div class="auth-feature"><i class="fas fa-infinity"></i><span>Free forever plan available</span></div>
        <div class="auth-feature"><i class="fas fa-globe"></i><span>Available in 195 countries</span></div>
        <div class="auth-feature"><i class="fas fa-users"></i><span>Collaborative playlists</span></div>
        <div class="auth-feature"><i class="fas fa-mobile-alt"></i><span>All devices, one account</span></div>
      </div>
    </div>
  </aside>

  <!-- Register Form Panel -->
  <main class="auth-panel">
    <div class="auth-form-wrapper">
      <a href="index.html" class="logo-link"><i class="fas fa-music"></i> Harmony</a>

      <h1 class="auth-heading">Create your account</h1>
      <p class="auth-subheading">Free forever. No credit card required.</p>

      <div class="form-error" id="registerError" role="alert" aria-live="polite"></div>

      <form id="registerForm" novalidate>
        <div class="form-group">
          <label class="form-label" for="fullName">Full Name</label>
          <div class="form-input-icon">
            <i class="fas fa-user input-icon"></i>
            <input type="text" id="fullName" class="form-input" placeholder="Your full name" autocomplete="name" required>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <div class="form-input-icon">
            <i class="fas fa-at input-icon"></i>
            <input type="text" id="username" class="form-input" placeholder="unique_username" autocomplete="username" required>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <div class="form-input-icon">
            <i class="fas fa-envelope input-icon"></i>
            <input type="email" id="email" class="form-input" placeholder="you@example.com" autocomplete="email" required>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="form-input-icon">
            <i class="fas fa-lock input-icon"></i>
            <input type="password" id="password" class="form-input" placeholder="Min. 8 characters" autocomplete="new-password" required>
            <button type="button" class="input-icon-right" id="togglePassword" aria-label="Toggle password">
              <i class="fas fa-eye" id="passToggleIcon"></i>
            </button>
          </div>
          <div class="password-strength">
            <div class="password-strength-bar" role="progressbar" aria-label="Password strength"></div>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirmPassword">Confirm Password</label>
          <div class="form-input-icon">
            <i class="fas fa-lock input-icon"></i>
            <input type="password" id="confirmPassword" class="form-input" placeholder="Repeat your password" autocomplete="new-password" required>
          </div>
        </div>

        <div style="margin-bottom:20px;">
          <label class="checkbox-label" style="align-items:flex-start;gap:12px;">
            <input type="checkbox" id="agreeTerms" required>
            <span class="checkbox-custom" style="margin-top:2px;" aria-hidden="true"></span>
            <span style="font-size:0.8rem;color:var(--text-secondary);line-height:1.5;">
              I agree to the <a href="#" style="color:var(--accent)">Terms of Service</a> and <a href="#" style="color:var(--accent)">Privacy Policy</a>
            </span>
          </label>
        </div>

        <button type="submit" class="btn btn-primary w-full" style="justify-content:center;padding:14px;">
          Create Free Account
        </button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Sign in</a>
      </div>
    </div>
  </main>

  <script type="module">
    import { initRegisterForm, auth } from './js/auth.js';
    import { applyTheme } from './js/profile.js';

    // Remove loading screen immediately
    const _ls = document.getElementById('loadingScreen');
    if (_ls) { _ls.classList.add('fade-out'); setTimeout(() => _ls.remove(), 400); }

    applyTheme();
    auth.requireGuest();
    initRegisterForm();

    document.getElementById('togglePassword')?.addEventListener('click', () => {
      const passInput = document.getElementById('password');
      const icon = document.getElementById('passToggleIcon');
      passInput.type = passInput.type === 'password' ? 'text' : 'password';
      icon.className = passInput.type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
    });
  </script>
</body>
</html>
