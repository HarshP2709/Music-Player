<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Favorites — Harmony Music Player</title>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/music-player.css">
  <link rel="stylesheet" href="css/profile.css">
  <link rel="stylesheet" href="css/playlist.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>

<body>

  <div id="loadingScreen">
    <div class="loading-logo">♪ Harmony</div>
    <div class="loading-bars">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
  </div>

  <div class="app-layout">
    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar" aria-label="Main navigation">
      <div class="sidebar__logo"><i class="fas fa-music"></i><span>Har<span>mony</span></span></div>
      <nav class="sidebar__nav">
        <span class="nav-section-title">Menu</span>
        <a href="dashboard.html" class="nav-link"><i class="fas fa-home nav-icon"></i> Dashboard</a>
        <a href="favorites.html" class="nav-link active"><i class="fas fa-heart nav-icon"></i> Favorites</a>
        <a href="playlist.html" class="nav-link"><i class="fas fa-list nav-icon"></i> My Playlists</a>
        <span class="nav-section-title">Library</span>
        <div id="sidebarPlaylists" class="sidebar__playlists"></div>
        <a href="playlist.html" class="nav-link"><i class="fas fa-plus nav-icon"></i> Create Playlist</a>
      </nav>
      <div class="sidebar__footer">
        <div class="sidebar__user" onclick="window.location='profile.html'" role="button" tabindex="0">
          <img id="sidebarAvatar" src="assets/images/default-avatar.jpg" class="sidebar__user-avatar" alt="Profile">
          <div>
            <div class="sidebar__user-name" id="sidebarName">—</div>
            <div class="sidebar__user-plan">Free Plan</div>
          </div>
        </div>
      </div>
    </aside>
    <div id="sidebarOverlay"></div>

    <!-- MAIN -->
    <div class="main-content">
      <header class="topbar">
        <div class="topbar__left">
          <button id="sidebarToggle" class="btn-icon"><i class="fas fa-bars"></i></button>
        </div>
        <div class="topbar__right">
          <div class="search-container" role="search">
            <i class="fas fa-search search-icon"></i>
            <input type="search" class="search-input" id="searchInput" placeholder="Search favorites..."
              aria-label="Search">
            <div id="searchOverlay">
              <div id="searchResults"></div>
            </div>
          </div>
          <button id="themeToggle" class="btn-icon"><i class="fas fa-sun"></i></button>
          <a href="profile.html" class="btn-icon">
            <img id="topbarAvatar" src="assets/images/default-avatar.jpg"
              style="width:32px;height:32px;border-radius:50%;border:2px solid var(--border);" alt="Profile">
          </a>
        </div>
      </header>

      <main class="page-content">
        <!-- Hero Banner -->
        <div
          style="background:linear-gradient(135deg,rgba(236,72,153,0.15),rgba(124,92,216,0.15));border:1px solid rgba(236,72,153,0.2);border-radius:var(--radius-xl);padding:36px;margin-bottom:32px;display:flex;align-items:center;gap:32px;">
          <div
            style="width:120px;height:120px;border-radius:var(--radius-xl);background:linear-gradient(135deg,#ec4899,#7c5cd8);display:flex;align-items:center;justify-content:center;font-size:3rem;flex-shrink:0;">
            <i class="fas fa-heart" style="color:white;"></i>
          </div>
          <div style="flex:1;">
            <p
              style="font-size:0.75rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);margin-bottom:8px;">
              Playlist</p>
            <h1 style="font-size:2.5rem;font-weight:800;margin-bottom:8px;">Liked Songs</h1>
            <p class="text-secondary" id="favCountText">Loading...</p>
            <div style="display:flex;align-items:center;gap:12px;margin-top:20px;">
              <button class="btn-play-big" id="playAllFavBtn" aria-label="Play all favorites">
                <i class="fas fa-play"></i>
              </button>
              <button class="btn btn-secondary btn-sm" id="shuffleFavBtn">
                <i class="fas fa-random"></i> Shuffle
              </button>
            </div>
          </div>
        </div>

        <!-- Favorites List -->
        <div id="favoritesList" role="main" aria-label="Favorites"></div>
      </main>
    </div>

    <!-- BOTTOM PLAYER -->
    <div id="bottomPlayer" role="region" aria-label="Music Player">
      <div class="player-left">
        <div class="player-cover-wrap">
          <img id="playerCover" src="assets/images/default-cover.jpg" class="player-cover" alt="">
        </div>
        <div class="player-info">
          <div class="player-title" id="playerSongTitle">No song playing</div>
          <div class="player-artist" id="playerArtist">—</div>
        </div>
        <div class="player-left-actions">
          <button class="btn-heart active" id="btnHeart"><i class="fas fa-heart"></i></button>
        </div>
      </div>
      <div class="player-center">
        <div class="player-controls">
          <button class="player-btn" id="btnShuffle"><i class="fas fa-random"></i></button>
          <button class="player-btn" id="btnPrev"><i class="fas fa-step-backward"></i></button>
          <button class="player-btn player-btn--play" id="btnPlayPause"><i class="fas fa-play"></i></button>
          <button class="player-btn" id="btnNext"><i class="fas fa-step-forward"></i></button>
          <button class="player-btn" id="btnRepeat"><i class="fas fa-redo"></i></button>
        </div>
        <div class="player-progress">
          <span class="player-time" id="currentTime">0:00</span>
          <input type="range" class="seek-bar" id="seekBar" min="0" max="100" value="0" aria-label="Progress">
          <span class="player-time" id="totalTime">0:00</span>
        </div>
      </div>
      <div class="player-right">
        <div class="volume-container">
          <button class="player-btn" id="btnMute"><i class="fas fa-volume-up"></i></button>
          <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="100" aria-label="Volume">
        </div>
        <button class="player-btn" id="btnQueue"><i class="fas fa-list-ul"></i></button>
      </div>
    </div>
    <aside id="queuePanel" aria-label="Queue">
      <div class="queue-header">
        <h3>Queue</h3>
        <button class="btn-icon" onclick="document.getElementById('queuePanel').classList.remove('open')"><i
            class="fas fa-times"></i></button>
      </div>
      <div id="queueList"></div>
    </aside>
  </div>

  <script type="module" src="js/app.js"></script>
</body>

</html>
